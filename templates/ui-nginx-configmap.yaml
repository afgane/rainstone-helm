{{- if .Values.frontend.enabled -}}
{{- $basePath := (trimSuffix "/" (.Values.frontend.basePath | default "/")) | default "/" -}}
{{- $apiPath := printf "%s/api" (trimSuffix "/" $basePath) | replace "//" "/" -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rainstone.frontend.fullname" . }}-nginx-conf
data:
    default.conf: |
        upstream backend_server {
            server {{ include "rainstone.backend.fullname" . }}:8000;
        }

        server {
            listen *:80;
            server_name _;
            root /usr/share/nginx/html;

            {{- if eq $basePath "/" }}
            location / {
                index index.html;
                try_files $uri $uri/ /index.html =404;
            }
            location /assets {
                expires 30d;
                add_header Cache-Control "public";
            }
            location /api {
                proxy_pass http://backend_server/api;
            }
            {{- else }}
            location = {{ $basePath }} {
                return 301 {{ $basePath }}/;
            }

            location ^~ {{ $apiPath }} {
                rewrite ^{{ $apiPath }}(/.*)?$ /api$1 break;
                proxy_pass http://backend_server;
            }

            location ^~ {{ $basePath }}/ {
                rewrite ^{{ $basePath }}(/.*)?$ $1 break;
                index index.html;
                try_files $uri $uri/ /index.html =404;
            }
            {{- end }}
        }
{{- end }}
---
