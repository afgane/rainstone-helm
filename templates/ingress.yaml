{{- $apiFullName := include "rainstone.backend.fullname" . -}}
{{- $apiServicePort := .Values.backend.service.port -}}
{{- $uiFullName := include "rainstone.frontend.fullname" . -}}
{{- $uiServicePort := .Values.frontend.service.port -}}
{{- $basePath := (trimSuffix "/" (.Values.frontend.basePath | default "/")) | default "/" -}}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rainstone-ingress
  {{- if .Values.ingress.annotations }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.backend.ingress.enabled }}
    {{- range .Values.backend.ingress.hosts }}
    - http:
        paths:
          {{- range .paths }}
          {{- $path := .path }}
          {{- if and (eq $path "/api") (not (eq $basePath "/")) }}
          {{- $path = printf "%s/api" (trimSuffix "/" $basePath) | replace "//" "/" }}
          {{- end }}
          - path: {{ $path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $apiFullName }}
                port:
                  number: {{ $apiServicePort }}
          {{- end }}
      {{- if .host }}
      host: {{ .host | quote }}
      {{- end }}
    {{- end }}
    {{- end }}
    {{- if .Values.frontend.ingress.enabled }}
    {{- range .Values.frontend.ingress.hosts }}
    - http:
        paths:
          {{- range .paths }}
          {{- $path := .path }}
          {{- if and (eq $path "/") (not (eq $basePath "/")) }}
          {{- $path = $basePath }}
          {{- end }}
          - path: {{ $path }}
            pathType: Prefix
            backend:
              service:
                name: {{ $uiFullName }}
                port:
                  number: {{ $uiServicePort }}
          {{- end }}
      {{- if .host }}
      host: {{ .host | quote }}
      {{- end }}
    {{- end }}
    {{- end }}
---
